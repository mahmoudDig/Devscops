name: DevSecOps CI

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      # Checkout Repository
      - name: Checkout Source
        uses: actions/checkout@v4

      # Secret Scanning
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Install Dependencies
      - name: Install Dependencies
        run: npm ci

      # SAST
      - name: Run Semgrep
        run: |
          python3 -m pip install semgrep
          semgrep --config=p/security-audit .

      # SCA
      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t devscops:${{ github.sha }} .

      # Container Scan
      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: devscops:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

      # Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tag Image
      - name: Tag Docker Image
        run: |
          docker tag devscops:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/devscops:${{ github.sha }}

      # Push Image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/devscops:${{ github.sha }}

      # Success
      - name: Build Check
        run: echo "DevSecOps Pipeline Completed Successfully"

# CI

# Checkout
# ↓
# Gitleaks
# ↓
# Semgrep
# ↓
# Trivy FS
# ↓
# Tests
# ↓
# Docker Build
# ↓
# Trivy Image

# CD

# Docker Login
# ↓
# Push Docker Image
# ↓
# Deploy
